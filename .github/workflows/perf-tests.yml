name: Performance Tests

on:
  workflow_dispatch:
    inputs:
      duration_seconds:
        description: 'Test duration in seconds'
        required: false
        default: '60'
      min_throughput:
        description: 'Minimum required throughput (req/s, 0 = no check)'
        required: false
        default: '0'
      max_p95_ms:
        description: 'Maximum allowed P95 latency (ms, 0 = no check)'
        required: false
        default: '0'
  schedule:
    # Run every Sunday at midnight UTC
    - cron: '0 0 * * 0'

jobs:
  perf-tests:
    name: Performance & Scale Tests (with Kafka)
    runs-on: ubuntu-latest

    services:
      zookeeper:
        image: confluentinc/cp-zookeeper:7.5.0
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
          ZOOKEEPER_TICK_TIME: 2000
        ports:
          - 2181:2181

      kafka:
        image: confluentinc/cp-kafka:7.5.0
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
          KAFKA_NUM_PARTITIONS: 10
        ports:
          - 9092:9092
        options: >-
          --health-cmd "kafka-broker-api-versions --bootstrap-server localhost:9092"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Prepare results directory
        run: mkdir -p perf-results

      # Run both perf test classes; tee output so it goes to console AND the raw log artifact
      - name: Run performance tests
        run: |
          mvn --batch-mode test \
            -Dtest='**/perf/**' \
            -DfailIfNoTests=false \
            -Dscale.perf.minThroughput=${{ github.event.inputs.min_throughput || '0' }} \
            -Dscale.perf.maxP95Ms=${{ github.event.inputs.max_p95_ms || '0' }} \
            2>&1 | tee perf-results/perf-raw.log
        env:
          PERF_TEST_DURATION_SECONDS: ${{ github.event.inputs.duration_seconds || '60' }}

      # Parse the raw log and emit a JSON metrics report + Markdown job summary
      - name: Extract metrics and write job summary
        if: always()
        run: |
          LOG=perf-results/perf-raw.log
          JSON=perf-results/metrics.json
          RUN_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # --- helpers ----------------------------------------------------------
          extract() {
            grep -oP "$1" "$LOG" | tail -1
          }

          # ProxyPerformanceTest output:
          #   Throughput: 1234.56 requests/sec (Total: 1000 messages in 810 ms)
          #   Average Latency: 0.812 ms
          THROUGHPUT_SIMPLE=$(extract 'Throughput: \K[0-9.]+(?= requests)')
          TOTAL_MSGS=$(extract 'Total: \K[0-9]+(?= messages)')
          DURATION_MS_SIMPLE=$(extract 'in \K[0-9]+(?= ms\))')
          AVG_LATENCY=$(extract 'Average Latency: \K[0-9.]+(?= ms)')

          # ProxyScaleTestSuite output:
          #   Performance scale run: requests=12800 throughput=3512.34 req/s p50=0.123ms p95=0.456ms p99=1.234ms max=5.678ms
          REQUESTS_SCALE=$(extract 'requests=\K[0-9]+')
          THROUGHPUT_SCALE=$(extract 'throughput=\K[0-9.]+(?= req)')
          P50=$(extract 'p50=\K[0-9.]+(?=ms)')
          P95=$(extract 'p95=\K[0-9.]+(?=ms)')
          P99=$(extract 'p99=\K[0-9.]+(?=ms)')
          MAX_LAT=$(extract 'max=\K[0-9.]+(?=ms)')

          # Write JSON
          cat > "$JSON" <<EOF
          {
            "run_date": "$RUN_DATE",
            "run_id": "${{ github.run_id }}",
            "commit": "${{ github.sha }}",
            "ref": "${{ github.ref }}",
            "simple_perf": {
              "throughput_req_per_sec": "${THROUGHPUT_SIMPLE:-N/A}",
              "total_messages": "${TOTAL_MSGS:-N/A}",
              "duration_ms": "${DURATION_MS_SIMPLE:-N/A}",
              "avg_latency_ms": "${AVG_LATENCY:-N/A}"
            },
            "scale_perf": {
              "completed_requests": "${REQUESTS_SCALE:-N/A}",
              "throughput_req_per_sec": "${THROUGHPUT_SCALE:-N/A}",
              "p50_ms": "${P50:-N/A}",
              "p95_ms": "${P95:-N/A}",
              "p99_ms": "${P99:-N/A}",
              "max_ms": "${MAX_LAT:-N/A}"
            }
          }
          EOF

          echo "Metrics JSON written:"
          cat "$JSON"

          # Write GitHub step summary (Markdown table)
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## 🚀 Kafka Proxy — Performance Test Results

          **Run:** [\`${{ github.run_id }}\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          **Commit:** \`${{ github.sha }}\`
          **Date:** $RUN_DATE

          ### Simple Perf (ProxyPerformanceTest)

          | Metric | Value |
          |---|---|
          | Throughput | ${THROUGHPUT_SIMPLE:-N/A} req/s |
          | Total messages | ${TOTAL_MSGS:-N/A} |
          | Duration | ${DURATION_MS_SIMPLE:-N/A} ms |
          | Avg latency | ${AVG_LATENCY:-N/A} ms |

          ### Scale Perf (ProxyScaleTestSuite)

          | Metric | Value |
          |---|---|
          | Completed requests | ${REQUESTS_SCALE:-N/A} |
          | Throughput | ${THROUGHPUT_SCALE:-N/A} req/s |
          | P50 latency | ${P50:-N/A} ms |
          | P95 latency | ${P95:-N/A} ms |
          | P99 latency | ${P99:-N/A} ms |
          | Max latency | ${MAX_LAT:-N/A} ms |
          EOF

      # Upload raw stdout log — useful for debugging regressions
      - name: Upload raw perf log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-raw-log-${{ github.run_id }}
          path: perf-results/perf-raw.log
          retention-days: 90

      # Upload structured JSON metrics — can be downloaded and graphed over time
      - name: Upload metrics JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-metrics-json-${{ github.run_id }}
          path: perf-results/metrics.json
          retention-days: 90

      # Upload Surefire XML reports — useful for CI integrations / test-result parsers
      - name: Upload Surefire test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-surefire-reports-${{ github.run_id }}
          path: target/surefire-reports/
          retention-days: 30
